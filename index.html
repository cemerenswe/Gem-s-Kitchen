<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem's Kitchen</title>
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/standards.css">
    <link rel="stylesheet" href="./style.css">
    
</head>
<body>
    <header class="header">
        <img class="header-logo" src="./assets/icons/logo02.png" alt="Bestell App Logo">
        <img class="burger-menu" src="./assets/icons/menu.png" alt="Burger Menu">
        <script src="./scripts/templates.js"></script>
    </header>
    <section class="hero">
        
    </section>
    <main class="main-content">
        <img class="logo-overlay" src="./assets/icons/logo01.png" alt="">
        <h1>Gem’s Kitchen</h1>
        <p>Gem’s Kitchen bringt dir authentische türkische Küche in entspannter, familiärer Atmosphäre – gutes Essen, gute Stimmung.</p>


        <section class="food-sections">
            <section class="kebap-section">
                <header class="section-headers">
                    <img src="./assets/icons/kebap.png" alt="">

                    <h2>Kebap Gerichte</h2>
                </header>
                <div id="kebap-dishes">
                    
                </div>
            </section>
            <section class="kebap-section">
                <header class="section-headers">
                    <img src="./assets/icons/dueruem.png" alt="">

                    <h2>Dürüm Gerichte</h2>
                </header>
                <div id="dürüm-dishes">
                    
                </div>
            </section>
            <section class="kebap-section">
                <header class="section-headers">
                    <img src="./assets/icons/beilagen.png" alt="">

                    <h2>Beilagen</h2>
                </header>
                <div id="side-dishes">
                    
                </div>
            </section>
        </section>
        <button class="dialog-button" onclick="openDialog()">Warenkorb anzeigen</button>
    </main>
    <footer class="main-footer">
        <p>©Copyright Gems Kitchen 2026</p>
        <p>|</p>
        <p>Cookie Preferences</p>
    </footer>
    <dialog class="basket-dialog" id="basket-dialog">
        <div class="dialog-content">
        <header>
            <h2>Dein Warenkorb</h2>
        </header>
        <div class="basket-container" id="basket-container"></div>
        <footer>
            <button id="close-btn">Schließen</button>
            <button id="order-btn">Bestellung aufgeben</button>
        </footer>
        </div>
    </dialog>
</body>
<script src="./script.js"></script>
</html>
